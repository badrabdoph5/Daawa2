<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-label="Modern Cinematic template preview">
  <defs>
    <linearGradient id="poster" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d8cab5"/>
      <stop offset=".45" stop-color="#353535"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity=".08"/>
      <stop offset=".65" stop-color="#000" stop-opacity=".26"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity=".4"/>
    </filter>
  </defs>
  <rect width="900" height="1200" fill="#0a0a0a"/>
  <rect width="900" height="660" fill="url(#poster)"/>
  <rect width="900" height="660" fill="url(#dark)"/>
  <text x="140" y="390" font-family="Arial, sans-serif" font-size="23" fill="#c0a080" letter-spacing="8">THE PREMIERE</text>
  <text x="140" y="500" font-family="Georgia, serif" font-size="98" fill="#fff">بدر</text>
  <text x="174" y="572" font-family="Georgia, serif" font-size="54" fill="#c0a080">&amp;</text>
  <text x="140" y="674" font-family="Georgia, serif" font-size="98" fill="#fff">Sara</text>
  <g filter="url(#shadow)">
    <line x1="120" y1="750" x2="780" y2="750" stroke="#fff" stroke-opacity=".12" stroke-width="2"/>
    <line x1="120" y1="875" x2="780" y2="875" stroke="#fff" stroke-opacity=".12" stroke-width="2"/>
    <line x1="450" y1="774" x2="450" y2="850" stroke="#fff" stroke-opacity=".12" stroke-width="2"/>
    <text x="285" y="835" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#eaeaea">Date</text>
    <text x="615" y="835" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#eaeaea">Time</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="126" y="936" width="260" height="180" rx="28" fill="#c0a080"/>
    <rect x="420" y="936" width="320" height="180" rx="28" fill="#242424"/>
  </g>
  <text x="450" y="1162" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#c0a080">سينمائي حديث</text>
